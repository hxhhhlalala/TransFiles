  }
  .tab-btn .tab-badge {
    display: inline-block; margin-left: 7px; padding: 1px 7px;
    border-radius: 10px; font-size: 11px; font-weight: 700;

  }
  .tab-btn.active .tab-badge { background: #0f2040; color: #7dd3fc; }

  /* ---- Baseline banner ---- */
  .baseline-banner {
    display: flex; align-items: center; gap: 16px;
    background: #1e2535; border: 1px solid #334155; border-left: 4px solid #60a5fa;
    border-radius: 8px; padding: 14px 20px; margin-bottom: 20px;
  }
  .baseline-banner .label { font-size: 12px; color: #94a3b8; }
  .baseline-banner .value { font-size: 22px; font-weight: 700; color: #60a5fa; }
  .baseline-banner .unit  { font-size: 13px; color: #94a3b8; }
  .baseline-banner .meta { font-size: 12px; color: #475569; margin-top: 3px; }

  /* ---- Toolbar ---- */
  .toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
  .toolbar button {
    padding: 7px 14px; border-radius: 6px; border: 1px solid #334155;
    background: #1e2535; color: #cbd5e1; font-size: 13px; cursor: pointer; transition: background .15s;
  }
  .toolbar button:hover { background: #2d3a52; }
  .toolbar button.primary { background: #2563eb; border-color: #3b82f6; color: #fff; }
  .toolbar button.primary:hover { background: #1d4ed8; }
  .toolbar .hint { font-size: 12px; color: #475569; }

  /* ---- Filter ---- */
  .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
  .filter-row label { font-size: 12px; color: #64748b; }
  .filter-row select {
    background: #1e2535; border: 1px solid #334155; color: #cbd5e1;
    padding: 5px 10px; border-radius: 5px; font-size: 12px; cursor: pointer;
  }
  .filter-row select:focus { outline: none; border-color: #3b82f6; }

  /* ---- Table ---- */
  .table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid #1e2535; }
  table { border-collapse: collapse; width: 100%; min-width: 820px; font-size: 13px; }
  thead th {
    background: #151b2e; color: #94a3b8; font-weight: 600;
    padding: 10px 14px; text-align: left; white-space: nowrap;
    border-bottom: 1px solid #1e2535; position: sticky; top: 0; z-index: 2;
  }
  thead th.sortable { cursor: pointer; user-select: none; }
  thead th.sortable:hover { color: #cbd5e1; }
  thead th .sort-icon { margin-left: 4px; opacity: .4; }
  thead th.sorted .sort-icon { opacity: 1; color: #60a5fa; }

  .group-header td {
    background: #1a2033; color: #7dd3fc; font-weight: 600; font-size: 12px;
    padding: 7px 14px; border-bottom: 1px solid #1e2535; letter-spacing: .05em;
  }

  tbody tr.data-row { border-bottom: 1px solid #1a2035; transition: background .1s; }
  tbody tr.data-row:hover { background: #1a2035; }
  tbody tr.data-row td { padding: 9px 14px; vertical-align: middle; }

  .case-id { font-family: monospace; font-size: 12px; color: #94a3b8; }
  .chip { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: 600; font-family: monospace; }
  .chip-sp  { background: #1e3a5f; color: #7dd3fc; }
  .chip-st  { background: #1e3d2f; color: #6ee7b7; }
  .chip-rf  { background: #3b2d1e; color: #fdba74; }
  .dit-time { font-family: monospace; font-weight: 600; color: #e2e8f0; }

  .speedup-cell { display: flex; align-items: center; gap: 8px; min-width: 140px; }
  .speedup-val { font-family: monospace; font-weight: 700; font-size: 13px; min-width: 56px; text-align: right; }
  .speedup-bar-bg { flex: 1; height: 8px; border-radius: 4px; background: #1e2535; overflow: hidden; min-width: 40px; }
  .speedup-bar-fill { height: 100%; border-radius: 4px; }
  .positive { color: #4ade80; }
  .negative { color: #f87171; }
  .neutral  { color: #94a3b8; }

  .precision-cell {
    min-width: 120px; max-width: 200px; border-radius: 5px; padding: 5px 8px;
    font-size: 12px; color: #e2e8f0; border: 1px solid transparent; outline: none;
    transition: border .15s, background .15s;
  }
  .precision-cell:focus { border: 1px solid #3b82f6; background: #1a2540; }
  .precision-cell[data-filled="true"] { border: 1px solid #1e3a5f; background: #131c2e; color: #7dd3fc; }
  .precision-cell.pass { border-color: #15803d !important; background: #052e16 !important; color: #4ade80 !important; }
  .precision-cell.fail { border-color: #9f1239 !important; background: #2d0a14 !important; color: #f87171 !important; }
  .notes-cell {
    min-width: 100px; max-width: 180px; border-radius: 5px; padding: 5px 8px;
    font-size: 12px; color: #94a3b8; border: 1px solid transparent; outline: none;
    transition: border .15s, background .15s;
  }
  .notes-cell:focus { border: 1px solid #475569; background: #1a2035; color: #cbd5e1; }

  /* ---- Stats ---- */
  .stats-row { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 20px; }
  .stat-card { background: #1e2535; border: 1px solid #334155; border-radius: 8px; padding: 12px 18px; min-width: 160px; }

<!-- Toolbar -->

    <option value="1">1（每步刷新）</option>

  </select>
</div>

<!-- Table -->

<tbody id="table-body"></tbody>

</div>

<div class="stats-row" id="stats-row"></div>

      {id:'case39',sp:'0.8',start:'15',refresh:'0',dit:928.5499},
      {id:'case40',sp:'0.8',start:'10',refresh:'1',dit:879.1226},
      {id:'case41',sp:'0.8',start:'10',refresh:'2',dit:817.3897},
      {id:'case42',sp:'0.8',start:'10',refresh:'0',dit:808.7576},
      {id:'case43',sp:'0.8',start:'5',refresh:'1',dit:756.6684},
      {id:'case44',sp:'0.8',start:'5',refresh:'2',dit:747.6132},
      {id:'case45',sp:'0.8',start:'5',refresh:'0',dit:738.5000},
    ]
  }
};

// ============================================================
// 状态
// ============================================================
let activeTab = '10';
let sortDir = { dit: 0, speedup: 0 };
let currentFilter = { sp: '', start: '', refresh: '' };
let displayData = [];

// ============================================================
// Tab 切换
// ============================================================
function switchTab(steps) {
  activeTab = steps;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`tab-${steps}`).classList.add('active');

  const ds = DATASETS[steps];
  document.getElementById('baseline-val').textContent = ds.baseline.toFixed(2);
  document.getElementById('baseline-meta').textContent = ds.config;
  document.getElementById('page-subtitle').innerHTML = ds.subtitle;

  // 重建 start_step 筛选器
  const sel = document.getElementById('filter-start');
  sel.innerHTML = '<option value="">全部</option>';
  ds.startOptions.forEach(v => {
    const opt = document.createElement('option');
    opt.value = v; opt.textContent = v;
    sel.appendChild(opt);
  });

  // 重置筛选状态
  currentFilter = { sp: '', start: '', refresh: '' };
  document.getElementById('filter-sp').value = '';
  sel.value = '';
  document.getElementById('filter-refresh').value = '';

  sortDir = { dit: 0, speedup: 0 };
  ['dit','speedup'].forEach(k => {
    const th = document.getElementById(`th-${k}`);
    th.classList.remove('sorted');
    th.querySelector('.sort-icon').textContent = '↕';
  });

  displayData = [...ds.data];
  document.getElementById('export-area').style.display = 'none';
  renderTable();
}

// ============================================================
// Storage
// ============================================================
function storageKey(id, field) {
  return `${DATASETS[activeTab].storagePrefix}_${id}_${field}`;
}
function getStored(id, field) { return localStorage.getItem(storageKey(id, field)) || ''; }
function setStored(id, field, val) { localStorage.setItem(storageKey(id, field), val); }

// ============================================================
// 计算
// ============================================================
function speedup(dit) {
  return (DATASETS[activeTab].baseline - dit) / DATASETS[activeTab].baseline * 100;
}

function barHtml(pct) {
  const maxPct = 25;
  const width = Math.min(100, Math.abs(pct) / maxPct * 100).toFixed(1);
  const color = pct >= 0 ? '#22c55e' : '#ef4444';
  const cls = pct > 0.5 ? 'positive' : pct < -0.5 ? 'negative' : 'neutral';
  const sign = pct > 0.5 ? '+' : '';
  return `<div class="speedup-cell">
    <span class="speedup-val ${cls}">${sign}${pct.toFixed(1)}%</span>
    <div class="speedup-bar-bg"><div class="speedup-bar-fill" style="width:${width}%;background:${color}"></div></div>
  </div>`;
}

// ============================================================
// 渲染
// ============================================================
const SP_DESC = { '0.5':'低稀疏','0.6':'中低稀疏','0.7':'中高稀疏','0.8':'高稀疏' };
let lastGroupSp = null;

function renderTable() {
  lastGroupSp = null;
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';

  const filtered = displayData.filter(r => {
    if (currentFilter.sp && r.sp !== currentFilter.sp) return false;
    if (currentFilter.start && r.start !== currentFilter.start) return false;
    if (currentFilter.refresh && r.refresh !== currentFilter.refresh) return false;
    return true;
  });

  filtered.forEach(row => {
    const pct = speedup(row.dit);
    const isBaseline = row.id === 'case00';

    // group separator
    if (!isBaseline && !currentFilter.sp && row.sp !== lastGroupSp) {
      lastGroupSp = row.sp;
      const gtr = document.createElement('tr');
      gtr.className = 'group-header';
      gtr.innerHTML = `<td colspan="8">▸ sparsity = ${row.sp}（${SP_DESC[row.sp] || ''}）</td>`;
      tbody.appendChild(gtr);
    }

    const tr = document.createElement('tr');
    tr.className = 'data-row';

    const spChip = isBaseline ? '<span style="color:#475569">—</span>' : `<span class="chip chip-sp">${row.sp}</span>`;
    const stChip = isBaseline ? '<span style="color:#475569">—</span>' : `<span class="chip chip-st">${row.start}</span>`;
    const rfChip = isBaseline ? '<span style="color:#475569">—</span>' : `<span class="chip chip-rf">${row.refresh}</span>`;
    const speedupHtml = isBaseline
      ? '<span style="color:#60a5fa;font-size:12px">■ 基线</span>'
      : barHtml(pct);

    const storedPrec = getStored(row.id, 'precision');
    const storedNote = getStored(row.id, 'notes');
    const precClass = 'precision-cell' + (storedPrec
      ? (storedPrec.match(/PASS|pass|通/i) ? ' pass' : storedPrec.match(/FAIL|fail|差/i) ? ' fail' : '')
      : '');

    tr.innerHTML = `
      <td><span class="case-id">${row.id}</span></td>
      <td>${spChip}</td>
      <td>${stChip}</td>
      <td>${rfChip}</td>
      <td><span class="dit-time">${row.dit.toFixed(2)}</span></td>
      <td>${speedupHtml}</td>
      <td><div class="${precClass}" contenteditable="true" data-id="${row.id}" data-field="precision"
          spellcheck="false" data-filled="${storedPrec ? 'true' : 'false'}"
          title="可输入: PASS / FAIL / PSNR值 / 主观评分等">${storedPrec}</div></td>
      <td><div class="notes-cell" contenteditable="true" data-id="${row.id}" data-field="notes"
          spellcheck="false">${storedNote}</div></td>`;
    tbody.appendChild(tr);
  });

  tbody.querySelectorAll('[contenteditable]').forEach(el => {
    el.addEventListener('input', onEdit);
    el.addEventListener('blur', onEdit);
  });

  renderStats(filtered);
}

function onEdit(e) {
  const el = e.target;
  const val = el.innerText.trim();
  setStored(el.dataset.id, el.dataset.field, val);
  if (el.dataset.field === 'precision') {
    el.className = 'precision-cell';
    if (val.match(/PASS|pass|通/i)) el.classList.add('pass');
    else if (val.match(/FAIL|fail|差/i)) el.classList.add('fail');
    el.dataset.filled = val ? 'true' : 'false';
  }
  showSaved();
}

function showSaved() {
  const el = document.getElementById('save-indicator');
  el.style.display = 'inline';
  clearTimeout(window._saveTimer);
  window._saveTimer = setTimeout(() => el.style.display = 'none', 2000);
}

function renderStats(rows) {
  const bsaRows = rows.filter(r => r.id !== 'case00');
  if (!bsaRows.length) { document.getElementById('stats-row').innerHTML = ''; return; }
  const speedups = bsaRows.map(r => speedup(r.dit));
  const best = Math.max(...speedups);
  const worst = Math.min(...speedups);
  const avg = speedups.reduce((a,b)=>a+b,0)/speedups.length;
  const bestRow = bsaRows[speedups.indexOf(best)];
  const positive = speedups.filter(s=>s>0).length;

  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">最大加速</div>
      <div class="stat-value" style="color:#4ade80">+${best.toFixed(1)}%</div>
      <div class="stat-sub">${bestRow.id} · sp=${bestRow.sp}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">最大劣化</div>
      <div class="stat-value" style="color:${worst<0?'#f87171':'#4ade80'}">${worst>0?'+':''}${worst.toFixed(1)}%</div>
      <div class="stat-sub">sp=0.5 区间</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">平均加速（当前筛选）</div>
      <div class="stat-value" style="color:${avg>0?'#4ade80':'#f87171'}">${avg>0?'+':''}${avg.toFixed(1)}%</div>
      <div class="stat-sub">${bsaRows.length} 个 BSA 用例</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">优于基线用例数</div>
      <div class="stat-value" style="color:#7dd3fc">${positive} / ${bsaRows.length}</div>
      <div class="stat-sub">sparsity ≥ 0.6 全部优于基线</div>
    </div>`;
}

// ============================================================
// 排序
// ============================================================
function sortBy(key) {
  sortDir[key] = -sortDir[key] || 1;
  const other = key === 'dit' ? 'speedup' : 'dit';
  sortDir[other] = 0;
  ['dit','speedup'].forEach(k => {
    const th = document.getElementById(`th-${k}`);
    th.classList.toggle('sorted', sortDir[k] !== 0);
    th.querySelector('.sort-icon').textContent = sortDir[k] === 1 ? '↑' : sortDir[k] === -1 ? '↓' : '↕';
  });
  displayData = [...DATASETS[activeTab].data].sort((a,b) => {
    const va = key === 'dit' ? a.dit : speedup(a.dit);
    const vb = key === 'dit' ? b.dit : speedup(b.dit);
    return sortDir[key] * (va - vb);
  });
  renderTable();
}

// ============================================================
// 筛选
// ============================================================
function applyFilter() {
  currentFilter.sp      = document.getElementById('filter-sp').value;
  currentFilter.start   = document.getElementById('filter-start').value;
  currentFilter.refresh = document.getElementById('filter-refresh').value;
  renderTable();
}

// ============================================================
// 导出
// ============================================================
function exportCSV() {
  const csv = buildCSV();
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `bsa_results_${activeTab}step.csv`;
  a.click();
}

function toggleExport() {
  const area = document.getElementById('export-area');
  if (area.style.display === 'block') { area.style.display = 'none'; return; }
  document.getElementById('export-text').value = buildCSV();
  area.style.display = 'block';
}

function buildCSV() {
  const lines = ['case_name,sparsity,sparse_start_step,mask_refresh_interval,dit_time_s,speedup_pct,precision,notes'];
  DATASETS[activeTab].data.forEach(r => {
    const pct = speedup(r.dit).toFixed(2);
    const prec = (getStored(r.id, 'precision') || '').replace(/,/g,'；');
    const note = (getStored(r.id, 'notes') || '').replace(/,/g,'；');
    lines.push([r.id, r.sp, r.start, r.refresh, r.dit.toFixed(4), pct, prec, note].join(','));
  });
  return lines.join('\n');
}

function clearPrecision() {
  if (!confirm('确认清空当前 Tab 的所有精度和备注？')) return;
  DATASETS[activeTab].data.forEach(r => {
    localStorage.removeItem(storageKey(r.id, 'precision'));
    localStorage.removeItem(storageKey(r.id, 'notes'));
  });
  renderTable();
}

// ============================================================
// 初始化
// ============================================================
switchTab('10');
</script>
</body>
</html>
